trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  name: Default

steps:
  - script: |
      where py
      py -3.11 --version
    displayName: Verify local Python 3.11

  - script: |
      py -3.11 -m pip install --upgrade pip
      py -3.11 -m pip install -r requirements.txt
    workingDirectory: AzureIt
    displayName: Install dependencies

  - script: |
      py -3.11 -m unittest tests/test_main_unittest.py -v
    workingDirectory: AzureIt
    displayName: Run Python unit tests

  - script: |
      py -3.11 manage.py test calculator -v 2
    workingDirectory: AzureIt
    displayName: Run Django app tests
